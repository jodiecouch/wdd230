<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Serendepity Chamber of Commerce" />
    <title>Serendepity Chamber of Commerce</title>
    <link rel="stylesheet" href="css/normalize.css" />
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/medium.css" />
    <link rel="stylesheet" href="css/large.css" />
  </head>
  <body>
    <header>
      <div class="logo">
        <picture>
          <img
            src="images/logo.png"
            alt="Serendepity Chamber of Commerce Logo"
          />
        </picture>
        <section class="headings">
          <h1>Serendepity</h1>
          <h2>Chamber of Commerce</h2>
        </section>
      </div>

      <div class="social">
        <a href="https://facebook.com" target="_blank">
          <img
            src="https://cdn.glitch.global/1709e8e9-fc12-4372-978e-8d6ce7842970/facebook.png?v=1643511083827"
            alt="Facebook Icon"
          />
        </a>

        <a href="http://instagram.com" target="_blank">
          <img
            src="https://cdn.glitch.global/1709e8e9-fc12-4372-978e-8d6ce7842970/instagram.png?v=1643511087990"
            alt="Instagram Icon"
          />
        </a>
      </div>

      <nav>
        <button id="hamburgerBtn">&#9776;</button>
        <ul id="primaryNav">
          <li><a href="#">Discover</a></li>
          <li><a href="#">Directory</a></li>
          <li><a href="#">Join</a></li>
          <li><a href="#">Contact</a></li>
        </ul>
      </nav>
    </header>
    <main>
      <div class="container">
        <div class="hero">Something grand and extravagent about our hero.</div>
        <div class="event">Event</div>
        <div class="weather">Weather</div>
        <div class="news">News Release</div>
        <div class="spot1">Spotlight 1</div>
        <div class="spot2">Spotlight 2</div>
      </div>
    </main>
    <footer>Footer Content</footer>
    <script src="js/script.js"></script>
  </body>
</html>
